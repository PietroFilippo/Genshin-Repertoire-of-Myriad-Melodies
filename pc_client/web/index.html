<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Genshin Rhythm Bot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Custom titlebar. The drag region honors pywebview's drag class. -->
    <div class="titlebar">
        <div class="titlebar-drag pywebview-drag-region">
            <img class="titlebar-icon" src="../assets/icon.ico" alt="">
            <span class="titlebar-title">Genshin Rhythm Bot</span>
        </div>
        <div class="titlebar-buttons">
            <button class="titlebar-btn" id="btn-min" title="Minimize">&#xE921;</button>
            <button class="titlebar-btn" id="btn-max" title="Maximize">&#xE922;</button>
            <button class="titlebar-btn titlebar-btn-close" id="btn-close" title="Close">&#xE8BB;</button>
        </div>
    </div>

    <!-- Tab strip -->
    <nav class="tabs">
        <button class="tab tab-active" data-tab="main">Main</button>
        <button class="tab" data-tab="macros">Macros</button>
        <button class="tab" data-tab="logs">Logs</button>
    </nav>

    <!-- Main tab -->
    <section class="panel panel-active" data-panel="main">
        <fieldset class="card">
            <legend>Mode</legend>
            <div class="row">
                <label class="radio">
                    <input type="radio" name="mode" value="standalone" checked>
                    <span class="radio-mark"></span>
                    <span>Standalone</span>
                </label>
                <span class="help" tabindex="0" aria-label="Standalone mode info"
                      data-help="Runs the rhythm detector indefinitely on whatever song is currently playing. Start it after you've manually opened a song.">?</span>
                <label class="radio">
                    <input type="radio" name="mode" value="album">
                    <span class="radio-mark"></span>
                    <span>Album</span>
                </label>
                <span class="help" tabindex="0" aria-label="Album mode info"
                      data-help="Auto-plays one country album page (Mondstadt / Liyue / Inazuma / ...) end to end. Open a country album page first, then press Start. Tip: switching Standalone → Album while a song is already playing picks up from the current song instead of going through the menu — press Stop first if you want to start from song 1. See the ? icons next to Songs and Difficulty for how those interact.">?</span>
            </div>
        </fieldset>

        <fieldset class="card" id="album-card">
            <legend>Album options</legend>
            <div class="row row-grid">
                <label for="songs">Songs</label>
                <div class="spinbox">
                    <input type="number" id="songs" min="1" max="12" value="12">
                    <div class="spinbox-buttons">
                        <button type="button" class="spinbox-up" data-target="songs">&#x25B2;</button>
                        <button type="button" class="spinbox-down" data-target="songs">&#x25BC;</button>
                    </div>
                </div>
                <span class="help" tabindex="0" aria-label="Songs info"
                      data-help="How many album song-slots to play before stopping. With one difficulty selected: exactly N songs. With All difficulties: N × 4 plays (each song at every difficulty). At 12 (full album) the song wheel rolls back to song 1 when done; partial runs leave the wheel at the last-played slot.">?</span>
            </div>
            <div class="row row-grid">
                <label for="difficulty">Difficulty</label>
                <div class="select-wrapper">
                    <select id="difficulty">
                        <option value="normal">Normal</option>
                        <option value="hard">Hard</option>
                        <option value="pro">Pro</option>
                        <option value="legendary" selected>Legendary</option>
                        <option value="all">All (Normal → Legendary)</option>
                    </select>
                </div>
                <span class="help" tabindex="0" aria-label="Difficulty info"
                      data-help="Pick one difficulty (Normal / Hard / Pro / Legendary) to play the album at that difficulty only. Pick All to cycle through every difficulty for the same song before moving to the next — e.g. song 1 Normal → Hard → Pro → Legendary, then song 2 Normal → ... With All, each song's canorus check is per-difficulty (skipped songs only skip the difficulty already at canorus).">?</span>
            </div>
        </fieldset>

        <div class="row checkbox-row">
            <label class="checkbox">
                <input type="checkbox" id="replay-canorus">
                <span class="check-mark"></span>
                <span>Replay songs already at Canorus</span>
            </label>
            <span class="help" tabindex="0" aria-label="Replay-canorus info"
                  data-help="When enabled, every song in the album is played even if it's already at Canorus rank. Disabled = skip already-Canorus'd songs to save time.">?</span>
        </div>

        <div class="row checkbox-row">
            <label class="checkbox">
                <input type="checkbox" id="debug">
                <span class="check-mark"></span>
                <span>Show debug visualization</span>
            </label>
            <span class="help" tabindex="0" aria-label="Debug visualization info"
                  data-help="Opens an OpenCV preview window showing the rhythm lane, sample dots, blue-channel readouts, FPS, and a live key-press log. Useful for tuning; small CPU cost.">?</span>
        </div>

        <div class="bottom-row">
            <fieldset class="card hotkeys">
                <legend>Hotkeys</legend>
                <div class="hk-row" data-action="start_stop">
                    <span class="hk-label">Start/Stop</span>
                    <span class="hk-binding">—</span>
                    <button type="button" class="rebind">Rebind</button>
                </div>
                <div class="hk-row" data-action="pause">
                    <span class="hk-label">Pause/Resume</span>
                    <span class="hk-binding">—</span>
                    <button type="button" class="rebind">Rebind</button>
                </div>
                <div class="hk-row" data-action="debug">
                    <span class="hk-label">Toggle Debug</span>
                    <span class="hk-binding">—</span>
                    <button type="button" class="rebind">Rebind</button>
                </div>
                <div class="hk-capture-msg"></div>
            </fieldset>

            <fieldset class="card status">
                <legend>Status</legend>
                <div class="status-grid">
                    <div class="status-rows">
                        <div class="st-row"><span class="st-key">State</span><span class="st-val" id="st-state">idle</span></div>
                        <div class="st-row"><span class="st-key">Song</span><span class="st-val" id="st-song">—</span></div>
                        <div class="st-row"><span class="st-key">FPS</span><span class="st-val" id="st-fps">—</span></div>
                        <div class="st-row"><span class="st-key">Debug</span><span class="st-val" id="st-debug">off</span></div>
                        <div class="st-row"><span class="st-key">Admin</span><span class="st-val" id="st-admin">…</span></div>
                    </div>
                    <div class="status-buttons">
                        <button type="button" id="btn-start" class="btn-primary">Start</button>
                        <button type="button" id="btn-pause" class="btn-secondary" disabled>Pause</button>
                    </div>
                </div>
            </fieldset>
        </div>
    </section>

    <!-- Macros tab -->
    <section class="panel" data-panel="macros">
        <fieldset class="card">
            <legend>Macro</legend>
            <div class="row macro-controls-row">
                <button type="button" id="macro-record" class="btn-primary">Record</button>
                <button type="button" id="macro-play" class="btn-secondary">Play</button>
                <button type="button" id="macro-stop-play" class="btn-secondary" disabled>Stop</button>
                <span class="macro-status" id="macro-status">idle &middot; 0 events</span>
                <span class="help" tabindex="0" aria-label="Macro info"
                      data-help="Record a sequence of keyboard + mouse actions inside Genshin and play it back via the Arduino. Recording captures input only while Genshin is focused; alt-tabbing to another app pauses capture. Hotkeys for record / play / stop / save / load also fire only inside the game.">?</span>
            </div>
        </fieldset>

        <fieldset class="card">
            <legend>Slots</legend>
            <div class="row macro-mode-row">
                <span class="macro-mode-label">On click:</span>
                <button type="button" class="macro-mode-btn macro-mode-active" data-mode="load">Load</button>
                <button type="button" class="macro-mode-btn" data-mode="save">Save</button>
                <button type="button" class="macro-mode-btn" data-mode="clear">Clear</button>
                <span class="help" tabindex="0" aria-label="Slot info"
                      data-help="Pick a click-mode then tap a slot. Load reads slot N into the current macro buffer. Save writes the current buffer to slot N (overwriting). Clear deletes slot N. Filled slots show in solid color; empty slots are outlined.">?</span>
            </div>
            <div class="slot-grid">
                <button type="button" class="slot" data-slot="1">1</button>
                <button type="button" class="slot" data-slot="2">2</button>
                <button type="button" class="slot" data-slot="3">3</button>
                <button type="button" class="slot" data-slot="4">4</button>
                <button type="button" class="slot" data-slot="5">5</button>
                <button type="button" class="slot" data-slot="6">6</button>
                <button type="button" class="slot" data-slot="7">7</button>
                <button type="button" class="slot" data-slot="8">8</button>
                <button type="button" class="slot" data-slot="9">9</button>
            </div>
            <div class="macro-pending" id="macro-pending"></div>
        </fieldset>

        <fieldset class="card hotkeys">
            <legend>Macro Hotkeys</legend>
            <div class="hk-row" data-action="macro_record">
                <span class="hk-label">Record / Stop</span>
                <span class="hk-binding">&mdash;</span>
                <button type="button" class="rebind">Rebind</button>
            </div>
            <div class="hk-row" data-action="macro_play">
                <span class="hk-label">Play</span>
                <span class="hk-binding">&mdash;</span>
                <button type="button" class="rebind">Rebind</button>
            </div>
            <div class="hk-row" data-action="macro_stop">
                <span class="hk-label">Stop Playback</span>
                <span class="hk-binding">&mdash;</span>
                <button type="button" class="rebind">Rebind</button>
            </div>
            <div class="hk-row" data-action="macro_save">
                <span class="hk-label">Save (1-9)</span>
                <span class="hk-binding">&mdash;</span>
                <button type="button" class="rebind">Rebind</button>
            </div>
            <div class="hk-row" data-action="macro_load">
                <span class="hk-label">Load (1-9)</span>
                <span class="hk-binding">&mdash;</span>
                <button type="button" class="rebind">Rebind</button>
            </div>
            <div class="hk-capture-msg"></div>
        </fieldset>
    </section>

    <!-- Logs tab -->
    <section class="panel" data-panel="logs">
        <div class="log-toolbar">
            <button type="button" id="btn-clear-log">Clear</button>
        </div>
        <pre class="log-pane" id="log-pane"></pre>
    </section>

    <script src="app.js"></script>
</body>
</html>
